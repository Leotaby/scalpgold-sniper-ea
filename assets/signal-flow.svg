<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080e"/>
      <stop offset="100%" style="stop-color:#0c0e1a"/>
    </linearGradient>
    <linearGradient id="gblu" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1e30"/>
    </linearGradient>
    <linearGradient id="ggold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2e08"/>
      <stop offset="100%" style="stop-color:#1e1604"/>
    </linearGradient>
    <linearGradient id="gpurp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1f4e"/>
      <stop offset="100%" style="stop-color:#160f26"/>
    </linearGradient>
    <linearGradient id="ggrn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2e1a"/>
      <stop offset="100%" style="stop-color:#061509"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" fill="url(#bg)" rx="10"/>
  <rect width="900" height="160" fill="none" stroke="#1a1e2e" stroke-width="1" rx="10"/>

  <!-- Grid lines -->
  <line x1="0" y1="80" x2="900" y2="80" stroke="#0f1120" stroke-width="1"/>

  <!-- Card 1: M15 Trend -->
  <rect x="20" y="20" width="175" height="120" rx="6" fill="url(#gblu)" stroke="#2a4a7f" stroke-width="1"/>
  <rect x="20" y="20" width="175" height="3" rx="2" fill="#38bdf8"/>
  <text x="108" y="52" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8" letter-spacing="2">LAYER 1</text>
  <text x="108" y="72" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#e2f0ff">M15 TREND</text>
  <text x="108" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a6a8a">LWMA(20) Slope</text>
  <text x="108" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#2a4a6a">Macro direction filter</text>
  <text x="108" y="125" text-anchor="middle" font-family="monospace" font-size="9" fill="#2a4a6a">Blocks counter-trend</text>

  <!-- Arrow 1 -->
  <line x1="198" y1="80" x2="222" y2="80" stroke="#E8B84B" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="222,75 232,80 222,85" fill="#E8B84B" filter="url(#glow)"/>

  <!-- Card 2: Stochastic -->
  <rect x="235" y="20" width="175" height="120" rx="6" fill="url(#ggold)" stroke="#5a4010" stroke-width="1"/>
  <rect x="235" y="20" width="175" height="3" rx="2" fill="#E8B84B"/>
  <text x="323" y="52" text-anchor="middle" font-family="monospace" font-size="10" fill="#E8B84B" letter-spacing="2">LAYER 2</text>
  <text x="323" y="72" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fff8e0">M5 TRIGGER</text>
  <text x="323" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a7030">Stoch(14,3,3)</text>
  <text x="323" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a4010">Crossover from &lt;30</text>
  <text x="323" y="125" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a4010">or &gt;70 zone only</text>

  <!-- Arrow 2 -->
  <line x1="413" y1="80" x2="437" y2="80" stroke="#E8B84B" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="437,75 447,80 437,85" fill="#E8B84B" filter="url(#glow)"/>

  <!-- Card 3: BB+RSI -->
  <rect x="450" y="20" width="175" height="120" rx="6" fill="url(#gpurp)" stroke="#4a3070" stroke-width="1"/>
  <rect x="450" y="20" width="175" height="3" rx="2" fill="#a78bfa"/>
  <text x="538" y="52" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" letter-spacing="2">LAYER 3</text>
  <text x="538" y="72" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#ede0ff">CONFIRMATION</text>
  <text x="538" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#6a50a0">BB(20,2) + RSI(14)</text>
  <text x="538" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a3070">Optional upgrade to</text>
  <text x="538" y="125" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a3070">HIGH CONFIDENCE ★</text>

  <!-- Arrow 3 -->
  <line x1="628" y1="80" x2="652" y2="80" stroke="#E8B84B" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="652,75 662,80 652,85" fill="#E8B84B" filter="url(#glow)"/>

  <!-- Card 4: Order -->
  <rect x="665" y="20" width="215" height="120" rx="6" fill="url(#ggrn)" stroke="#1a4a2a" stroke-width="1"/>
  <rect x="665" y="20" width="215" height="3" rx="2" fill="#22c55e"/>
  <text x="773" y="52" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e" letter-spacing="2">EXECUTE</text>
  <text x="773" y="72" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#d0ffd0">ORDER SENT</text>
  <text x="773" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#2a6a3a">ATR-Adaptive SL / TP</text>
  <text x="773" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a4a2a">Margin check · Spread gate</text>
  <text x="773" y="125" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a4a2a">Session filter · Risk engine</text>
</svg>
