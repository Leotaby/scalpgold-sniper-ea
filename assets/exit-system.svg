<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080e"/>
      <stop offset="100%" style="stop-color:#0c0e1a"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bg3)" rx="10"/>
  <rect width="900" height="200" fill="none" stroke="#1a1e2e" stroke-width="1" rx="10"/>

  <!-- Candle body -->
  <line x1="100" y1="30" x2="100" y2="175" stroke="#2a3050" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Entry label -->
  <text x="100" y="20" text-anchor="middle" font-family="monospace" font-size="9" fill="#38bdf8" letter-spacing="1">ENTRY</text>
  <circle cx="100" cy="105" r="5" fill="#38bdf8" filter="url(#glow3)"/>

  <!-- SL line -->
  <line x1="60" y1="155" x2="840" y2="155" stroke="#f43f5e" stroke-width="1" stroke-dasharray="5,4" opacity="0.6"/>
  <text x="50" y="159" text-anchor="end" font-family="monospace" font-size="9" fill="#f43f5e">SL</text>
  <rect x="720" y="145" width="160" height="20" rx="3" fill="#1a0608" stroke="#3a1015" stroke-width="1"/>
  <text x="800" y="159" text-anchor="middle" font-family="monospace" font-size="9" fill="#f43f5e">DD%</text>

  <!-- TP line -->
  <line x1="60" y1="45" x2="840" y2="45" stroke="#22c55e" stroke-width="1" stroke-dasharray="5,4" opacity="0.6"/>
  <text x="50" y="49" text-anchor="end" font-family="monospace" font-size="9" fill="#22c55e">TP</text>
  <rect x="720" y="35" width="160" height="20" rx="3" fill="#060d08" stroke="#1a3020" stroke-width="1"/>
  <text x="800" y="49" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">Trail</text>

  <!-- Trail Arm Level -->
  <line x1="60" y1="90" x2="840" y2="90" stroke="#E8B84B" stroke-width="1" stroke-dasharray="3,4" opacity="0.4"/>
  <text x="50" y="94" text-anchor="end" font-family="monospace" font-size="9" fill="#E8B84B">Trail Level</text>

  <!-- Price path going up -->
  <polyline points="100,105 180,100 240,95 300,88 360,82 400,78" fill="none" stroke="#38bdf8" stroke-width="2"/>

  <!-- Trail arm marker (approx y=90) -->
  <circle cx="340" cy="90" r="6" fill="none" stroke="#E8B84B" stroke-width="1.5" filter="url(#glow3)"/>
  <text x="340" y="75" text-anchor="middle" font-family="monospace" font-size="8" fill="#E8B84B">TRAIL</text>
  <line x1="340" y1="78" x2="340" y2="84" stroke="#E8B84B" stroke-width="1" opacity="0.6"/>

  <!-- Remaining 50% continues up -->
  <polyline points="340,90 400,78 460,68 530,58 600,50" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Trailing stop path -->
  <polyline points="300,118 360,112 400,108 440,104 480,100 530,96" fill="none" stroke="#E8B84B" stroke-width="1.5" opacity="0.7"/>
  <text x="430" y="130" text-anchor="middle" font-family="monospace" font-size="8" fill="#E8B84B" opacity="0.8">TRAILING STOP</text>

  <!-- Trail activation marker -->
  <text x="300" y="108" text-anchor="middle" font-family="monospace" font-size="7" fill="#E8B84B" opacity="0.6">▶ activates at threshold</text>

  <!-- TP hit marker -->
  <circle cx="600" cy="50" r="7" fill="#22c55e" opacity="0.15"/>
  <circle cx="600" cy="50" r="4" fill="#22c55e" filter="url(#glow3)"/>
  <text x="600" y="35" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e" letter-spacing="1">TP HIT ✓</text>

  <!-- RR Annotation -->
  <!-- Arrow from SL to entry -->
  <line x1="140" y1="107" x2="140" y2="153" stroke="#f43f5e" stroke-width="1" opacity="0.5"/>
  <text x="152" y="136" font-family="monospace" font-size="8" fill="#f43f5e" opacity="0.7">DD%</text>
  <!-- Arrow from entry to TP -->
  <line x1="140" y1="103" x2="140" y2="47" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <text x="152" y="78" font-family="monospace" font-size="8" fill="#22c55e" opacity="0.7">Trail</text>
  <!-- RR label -->
  <rect x="158" y="94" width="80" height="16" rx="2" fill="#0d0f18" stroke="#1a1e2e" stroke-width="1"/>
  <text x="198" y="106" text-anchor="middle" font-family="monospace" font-size="8" fill="#E8B84B">R/R  1:1.67</text>

  <!-- 4H close note -->
  <rect x="620" y="120" width="220" height="16" rx="3" fill="#0d0f18" stroke="#1a1e2e" stroke-width="1"/>
  <text x="730" y="132" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a5568" letter-spacing="1">MAX HOLD: 4H  ·  EOD CLOSE 16:55 GMT</text>
</svg>
