<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080e"/>
      <stop offset="100%" style="stop-color:#0c0e1a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="160" fill="url(#bg4)" rx="10"/>
  <rect width="900" height="160" fill="none" stroke="#1a1e2e" stroke-width="1" rx="10"/>

  <!-- 6 indicator cards, each 140px wide with 10px gaps -->
  <!-- Card spacing: (900 - 6×140 - 5×10) / 2 = (900-840-50)/2 = 5 each side = start at 5 -->

  <!-- LWMA -->
  <rect x="10"   y="10" width="140" height="140" rx="5" fill="#0b0e1a" stroke="#1a2a4a" stroke-width="1"/>
  <rect x="10"   y="10" width="140" height="3" rx="2" fill="#38bdf8"/>
  <text x="80"  y="40"  text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#38bdf8">LWMA</text>
  <text x="80"  y="58"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#2a4a6a">Period 20</text>
  <text x="80"  y="70"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#2a4a6a">M5 + M15</text>
  <line x1="20" y1="82" x2="140" y2="82" stroke="#1a2a3a" stroke-width="1"/>
  <text x="80"  y="98"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#5a7a9a">Trend direction</text>
  <text x="80"  y="112" text-anchor="middle" font-family="monospace" font-size="9"  fill="#5a7a9a">Dual timeframe</text>
  <text x="80"  y="126" text-anchor="middle" font-family="monospace" font-size="9"  fill="#5a7a9a">Core filter</text>

  <!-- STOCHASTIC -->
  <rect x="160" y="10" width="140" height="140" rx="5" fill="#0b0e1a" stroke="#3a2a0a" stroke-width="1"/>
  <rect x="160" y="10" width="140" height="3" rx="2" fill="#E8B84B"/>
  <text x="230" y="40"  text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#E8B84B">STOCHASTIC</text>
  <text x="230" y="58"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#5a4010">14 · 3 · 3</text>
  <text x="230" y="70"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#5a4010">STO_LOWHIGH</text>
  <line x1="170" y1="82" x2="290" y2="82" stroke="#2a1a0a" stroke-width="1"/>
  <text x="230" y="98"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#8a7040">Entry trigger</text>
  <text x="230" y="112" text-anchor="middle" font-family="monospace" font-size="9"  fill="#8a7040">Extreme zones</text>
  <text x="230" y="126" text-anchor="middle" font-family="monospace" font-size="9"  fill="#8a7040">&lt;30 or &gt;70 only</text>

  <!-- BOLLINGER BANDS -->
  <rect x="310" y="10" width="140" height="140" rx="5" fill="#0b0e1a" stroke="#0a2a3a" stroke-width="1"/>
  <rect x="310" y="10" width="140" height="3" rx="2" fill="#06b6d4"/>
  <text x="380" y="38"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#06b6d4">BOLL. BANDS</text>
  <text x="380" y="56"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#0a4a5a">Period 20</text>
  <text x="380" y="68"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#0a4a5a">Deviation 2.0</text>
  <line x1="320" y1="82" x2="440" y2="82" stroke="#0a2a3a" stroke-width="1"/>
  <text x="380" y="98"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#2a8a9a">Band edge confirm</text>
  <text x="380" y="112" text-anchor="middle" font-family="monospace" font-size="9"  fill="#2a8a9a">Mid = partial exit</text>
  <text x="380" y="126" text-anchor="middle" font-family="monospace" font-size="9"  fill="#2a8a9a">Volatility context</text>

  <!-- RSI -->
  <rect x="460" y="10" width="140" height="140" rx="5" fill="#0b0e1a" stroke="#2a1a4a" stroke-width="1"/>
  <rect x="460" y="10" width="140" height="3" rx="2" fill="#a78bfa"/>
  <text x="530" y="40"  text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#a78bfa">RSI</text>
  <text x="530" y="58"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#3a2a6a">Period 14</text>
  <text x="530" y="70"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#3a2a6a">Levels 35 / 65</text>
  <line x1="470" y1="82" x2="590" y2="82" stroke="#2a1a4a" stroke-width="1"/>
  <text x="530" y="98"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#7a5aba">Secondary confirm</text>
  <text x="530" y="112" text-anchor="middle" font-family="monospace" font-size="9"  fill="#7a5aba">Paired with BB</text>
  <text x="530" y="126" text-anchor="middle" font-family="monospace" font-size="9"  fill="#7a5aba">Strength upgrade</text>

  <!-- ATR -->
  <rect x="610" y="10" width="140" height="140" rx="5" fill="#0b0e1a" stroke="#0a2a1a" stroke-width="1"/>
  <rect x="610" y="10" width="140" height="3" rx="2" fill="#22c55e"/>
  <text x="680" y="40"  text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#22c55e">ATR</text>
  <text x="680" y="58"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#0a3a1a">Period 14</text>
  <text x="680" y="70"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#0a3a1a">All exits</text>
  <line x1="620" y1="82" x2="740" y2="82" stroke="#0a2a1a" stroke-width="1"/>
  <text x="680" y="98"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#2a8a4a">SL · TP · Trail</text>
  <text x="680" y="112" text-anchor="middle" font-family="monospace" font-size="9"  fill="#2a8a4a">Volatility-adaptive</text>
  <text x="680" y="126" text-anchor="middle" font-family="monospace" font-size="9"  fill="#2a8a4a">No fixed pips</text>

  <!-- SPREAD GATE -->
  <rect x="760" y="10" width="130" height="140" rx="5" fill="#0b0e1a" stroke="#3a1a1a" stroke-width="1"/>
  <rect x="760" y="10" width="130" height="3" rx="2" fill="#f43f5e"/>
  <text x="825" y="38"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#f43f5e">SPREAD</text>
  <text x="825" y="52"  text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#f43f5e">GATE</text>
  <text x="825" y="70"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#4a1a1a">Max 35 pts</text>
  <line x1="770" y1="82" x2="880" y2="82" stroke="#2a1a1a" stroke-width="1"/>
  <text x="825" y="98"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#8a3a3a">Blocks news</text>
  <text x="825" y="112" text-anchor="middle" font-family="monospace" font-size="9"  fill="#8a3a3a">spikes &amp; gaps</text>
  <text x="825" y="126" text-anchor="middle" font-family="monospace" font-size="9"  fill="#8a3a3a">ECN/STP only</text>
</svg>
